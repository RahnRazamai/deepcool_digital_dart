name: Build packages

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  linux-arch:
    name: Linux Arch package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libgtk-3-dev xz-utils

      - name: Get Flutter deps
        run: flutter pub get
        working-directory: flutter_desktop

      - name: Build Flutter Linux release
        run: flutter build linux --release
        working-directory: flutter_desktop

      - name: Build CLI daemon
        run: |
          mkdir -p build
          dart pub get
          dart compile exe bin/deepcool_digital_dart.dart -o build/deepcool-digital-dart

      - name: Prepare Arch source tarball
        run: |
          set -euo pipefail

          PKGNAME=deepcool-desktop
          ARCHDIR=packaging/arch

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PKGVER="${GITHUB_REF_NAME#v}"
          else
            PKGVER="0.1.0"
          fi

          sed -i "s/^pkgver=.*/pkgver=$PKGVER/" "$ARCHDIR/PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$ARCHDIR/PKGBUILD"

          rm -rf "$ARCHDIR/$PKGNAME-$PKGVER"
          mkdir -p "$ARCHDIR/$PKGNAME-$PKGVER"

          test -f flutter_desktop/build/linux/x64/release/bundle/deepcool_desktop_app
          test -f flutter_desktop/build/linux/x64/release/bundle/lib/libflutter_linux_gtk.so
          test -d flutter_desktop/build/linux/x64/release/bundle/data
          test -x build/deepcool-digital-dart

          mkdir -p "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle"
          cp -a flutter_desktop/build/linux/x64/release/bundle/. "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle/"
          install -Dm755 build/deepcool-digital-dart "$ARCHDIR/$PKGNAME-$PKGVER/build/deepcool-digital-dart"

          if [ -d packaging/udev ]; then
            cp -r packaging/udev "$ARCHDIR/$PKGNAME-$PKGVER/udev"
          fi

          tar -C "$ARCHDIR" -czf "$ARCHDIR/${PKGNAME}-${PKGVER}.tar.gz" "$PKGNAME-$PKGVER"
          rm -rf "$ARCHDIR/$PKGNAME-$PKGVER"

      - name: Build Arch package
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/work -w /work/packaging/arch archlinux:latest /bin/bash -lc '
            set -euo pipefail
            pacman -Sy --noconfirm --needed base-devel git gtk3 hidapi
            host_uid=$(stat -c "%u" /work)
            host_gid=$(stat -c "%g" /work)
            if ! getent group "$host_gid" >/dev/null; then
              groupadd -g "$host_gid" builder
            fi
            host_group=$(getent group "$host_gid" | cut -d: -f1)
            if ! id -u builder >/dev/null 2>&1; then
              useradd -m -u "$host_uid" -g "$host_group" builder
            fi
            chown -R "$host_uid:$host_gid" /work/packaging/arch
            runuser -u builder -- makepkg -C --skipinteg --noconfirm
          '

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arch-package
          path: |
            packaging/arch/*.tar.gz
            packaging/arch/*.pkg.*

  windows:
    name: Windows package
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Download LibreHardwareMonitor
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $release = Invoke-RestMethod https://api.github.com/repos/LibreHardwareMonitor/LibreHardwareMonitor/releases/latest
          $asset = $release.assets |
            Where-Object { $_.name -like "*.zip" -and $_.name -notlike "*source*" } |
            Select-Object -First 1
          if (-not $asset) {
            throw "No LibreHardwareMonitor zip asset found in latest release."
          }
          New-Item -ItemType Directory -Force -Path build\lhm | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile build\lhm\LibreHardwareMonitor.zip
          Expand-Archive build\lhm\LibreHardwareMonitor.zip -DestinationPath build\lhm -Force
          $dll = Get-ChildItem build\lhm -Recurse -Filter LibreHardwareMonitorLib.dll | Select-Object -First 1
          if (-not $dll) {
            throw "LibreHardwareMonitorLib.dll was not found in downloaded archive."
          }
          "LHM_DIR=$($dll.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Get Flutter deps
        run: flutter pub get
        working-directory: flutter_desktop

      - name: Build Windows release artifacts
        shell: pwsh
        run: .\packaging\windows\build-release.ps1 -LibreHardwareMonitorDir "$env:LHM_DIR"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            packaging/out/*.zip
            packaging/out/*.exe

  release:
    name: GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-arch
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(release-assets/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No release files found"
            exit 1
          fi

          generated_notes_file="$(mktemp)"
          release_notes_file="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" \
            --jq '.body' > "$generated_notes_file"

          {
            cat "$generated_notes_file"
            cat <<'RELEASE_NOTES'

          ## Downloads

          | System | Recommended download |
          | --- | --- |
          | Arch Linux | `.pkg.tar.zst` |
          | Windows | `DeepCoolDigitalDartSetup-*-windows-x64.exe` |

          ## Install

          Arch Linux:

          ```bash
          sudo pacman -U deepcool-desktop-*.pkg.tar.zst
          ```

          Windows:

          Download and run `DeepCoolDigitalDartSetup-*-windows-x64.exe`.

          ## Notes

          - Linux packages are currently Arch-only.
          - Windows packages include the headless sensor backend, LibreHardwareMonitorLib dependencies, HIDAPI, and the Flutter GUI.
          - PSU readings require the operating system or hardware backend to expose real PSU telemetry. If no PSU sensor is available, PSU mode can fall back to estimated CPU + GPU power when those sensors are readable.
          RELEASE_NOTES
          } > "$release_notes_file"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --notes-file "$release_notes_file"
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "Release $GITHUB_REF_NAME" \
              --notes-file "$release_notes_file"
          fi
