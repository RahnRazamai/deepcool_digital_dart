name: Build packages

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

permissions:
  contents: write
    
jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libgtk-3-dev curl wget xz-utils imagemagick

      - name: Get Flutter deps
        run: flutter pub get
        working-directory: flutter_desktop

      - name: Build Flutter Linux release
        run: flutter build linux --release
        working-directory: flutter_desktop

      - name: Build CLI daemon
        run: |
          mkdir -p build
          dart pub get
          dart compile exe bin/deepcool_digital_dart.dart -o build/deepcool-digital-dart

      - name: Build .deb package
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0"
          fi

          bash packaging/debian/make-deb.sh "$VERSION"

      - name: Download linuxdeploy and appimagetool
        run: |
          curl -LO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -LO https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage || true
          chmod +x linuxdeploy-*.AppImage || true
          chmod +x appimagetool-*.AppImage || true
          APPIMAGE_DIR="$(cd "$(pwd)" && pwd)"
          printf '#!/bin/bash\nexec "%s/linuxdeploy-x86_64.AppImage" "$@"\n' "$APPIMAGE_DIR" > linuxdeploy
          chmod +x linuxdeploy
          sudo mv linuxdeploy /usr/local/bin/linuxdeploy
          if [ -f appimagetool-x86_64.AppImage ]; then
            printf '#!/bin/bash\nexec "%s/appimagetool-x86_64.AppImage" "$@"\n' "$APPIMAGE_DIR" > appimagetool
            chmod +x appimagetool
            sudo mv appimagetool /usr/local/bin/appimagetool
          fi

      - name: Build AppImage
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0"
          fi

          bash packaging/appimage/make-appimage.sh "$VERSION"

      - name: Prepare Arch source tarball
        run: |
          set -euo pipefail

          PKGNAME=deepcool-desktop
          ARCHDIR=packaging/arch

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PKGVER="${GITHUB_REF_NAME#v}"
          else
            PKGVER="0.1.0"
          fi

          # Update PKGBUILD version to match release tag
          sed -i "s/^pkgver=.*/pkgver=$PKGVER/" "$ARCHDIR/PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/" "$ARCHDIR/PKGBUILD"

          rm -rf "$ARCHDIR/$PKGNAME-$PKGVER"
          mkdir -p "$ARCHDIR/$PKGNAME-$PKGVER"

          test -f flutter_desktop/build/linux/x64/release/bundle/deepcool_desktop_app
          test -f flutter_desktop/build/linux/x64/release/bundle/lib/libflutter_linux_gtk.so
          test -d flutter_desktop/build/linux/x64/release/bundle/data
          test -x build/deepcool-digital-dart

          # Copy FULL Flutter bundle
          mkdir -p "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle"
          cp -a flutter_desktop/build/linux/x64/release/bundle/. "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle/"

          # Copy CLI daemon
          install -Dm755 build/deepcool-digital-dart "$ARCHDIR/$PKGNAME-$PKGVER/build/deepcool-digital-dart"

          # Copy packaging extras
          if [ -d packaging/udev ]; then
            cp -r packaging/udev "$ARCHDIR/$PKGNAME-$PKGVER/udev"
          fi

          test -f "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle/deepcool_desktop_app"
          test -f "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle/lib/libflutter_linux_gtk.so"
          test -d "$ARCHDIR/$PKGNAME-$PKGVER/flutter-bundle/data"

          echo "Arch source content:"
          find "$ARCHDIR/$PKGNAME-$PKGVER" -maxdepth 3 -type f | sort | head -80

          tar -C "$ARCHDIR" -czf "$ARCHDIR/${PKGNAME}-${PKGVER}.tar.gz" "$PKGNAME-$PKGVER"
          rm -rf "$ARCHDIR/$PKGNAME-$PKGVER"

      - name: Build Arch package (in Arch container)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/work -w /work/packaging/arch archlinux:latest /bin/bash -lc '
            set -euo pipefail
            pacman -Sy --noconfirm --needed base-devel wget git gtk3 hidapi
            host_uid=$(stat -c "%u" /work)
            host_gid=$(stat -c "%g" /work)
            if ! getent group "$host_gid" >/dev/null; then
              groupadd -g "$host_gid" builder
            fi
            host_group=$(getent group "$host_gid" | cut -d: -f1)
            if ! id -u builder >/dev/null 2>&1; then
              useradd -m -u "$host_uid" -g "$host_group" builder
            fi
            chown -R "$host_uid:$host_gid" /work/packaging/arch
            runuser -u builder -- makepkg -C --skipinteg --noconfirm
          '
        env:
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            packaging/out/**/*.deb
            packaging/appimage/*.AppImage
            packaging/arch/*.tar.gz
            packaging/arch/*.pkg.*

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=(
            packaging/out/**/*.deb
            packaging/appimage/*.AppImage
            packaging/arch/*.tar.gz
            packaging/arch/*.pkg.*
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: No release files found"
            exit 1
          fi

          generated_notes_file="$(mktemp)"
          release_notes_file="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$GITHUB_REF_NAME" \
            --jq '.body' > "$generated_notes_file"

          {
            cat "$generated_notes_file"
            printf '\n\n'
            awk '
              /^## Support$/ { copy = 1 }
              /^## Troubleshooting$/ { copy = 0 }
              copy { print }
            ' README.md
          } > "$release_notes_file"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release already exists. Uploading assets with --clobber..."
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --notes-file "$release_notes_file"
          else
            echo "Creating release $GITHUB_REF_NAME..."
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "Release $GITHUB_REF_NAME" \
              --notes-file "$release_notes_file"
          fi
