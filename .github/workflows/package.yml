name: Build packages

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libgtk-3-dev curl wget xz-utils imagemagick

      - name: Get Flutter deps
        run: flutter pub get
        working-directory: flutter_desktop

      - name: Build Flutter Linux release
        run: flutter build linux --release
        working-directory: flutter_desktop

      - name: Build CLI daemon
        run: dart compile exe bin/deepcool_digital_dart.dart -o build/deepcool-digital-dart

      - name: Build .deb package
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0"
          fi

          bash packaging/debian/make-deb.sh "$VERSION"

      - name: Download linuxdeploy and appimagetool
        run: |
          curl -LO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -LO https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage || true
          chmod +x linuxdeploy-*.AppImage || true
          chmod +x appimagetool-*.AppImage || true
          APPIMAGE_DIR="$(cd "$(pwd)" && pwd)"
          printf '#!/bin/bash\nexec "%s/linuxdeploy-x86_64.AppImage" "$@"\n' "$APPIMAGE_DIR" > linuxdeploy
          chmod +x linuxdeploy
          sudo mv linuxdeploy /usr/local/bin/linuxdeploy
          if [ -f appimagetool-x86_64.AppImage ]; then
            printf '#!/bin/bash\nexec "%s/appimagetool-x86_64.AppImage" "$@"\n' "$APPIMAGE_DIR" > appimagetool
            chmod +x appimagetool
            sudo mv appimagetool /usr/local/bin/appimagetool
          fi

      - name: Build AppImage
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0"
          fi

          bash packaging/appimage/make-appimage.sh "$VERSION"

      - name: Prepare Arch source tarball
        run: |
          set -euo pipefail
          PKGNAME=deepcool-desktop
          ARCHDIR=packaging/arch
          # read pkgver from PKGBUILD so the tarball name matches
          PKGVER=$(awk -F= '/^pkgver=/ {print $2; exit}' "$ARCHDIR/PKGBUILD")
          rm -rf "$ARCHDIR/$PKGNAME-$PKGVER"
          mkdir -p "$ARCHDIR/$PKGNAME-$PKGVER"
          test -f flutter_desktop/build/linux/x64/release/bundle/deepcool_desktop_app
          test -x build/deepcool-digital-dart
          cp -r flutter_desktop "$ARCHDIR/$PKGNAME-$PKGVER/"
          install -Dm755 build/deepcool-digital-dart "$ARCHDIR/$PKGNAME-$PKGVER/build/deepcool-digital-dart"
          cp -r packaging/udev "$ARCHDIR/$PKGNAME-$PKGVER/udev"
          cp -r packaging/systemd "$ARCHDIR/$PKGNAME-$PKGVER/systemd"
          tar -C "$ARCHDIR" -czf "$ARCHDIR/${PKGNAME}-${PKGVER}.tar.gz" "$PKGNAME-$PKGVER"
          rm -rf "$ARCHDIR/$PKGNAME-$PKGVER"

      - name: Build Arch package (in Arch container)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/work -w /work/packaging/arch archlinux:latest /bin/bash -lc '
            set -euo pipefail
            pacman -Sy --noconfirm --needed base-devel wget git gtk3 hidapi
            host_uid=$(stat -c "%u" /work)
            host_gid=$(stat -c "%g" /work)
            if ! getent group "$host_gid" >/dev/null; then
              groupadd -g "$host_gid" builder
            fi
            host_group=$(getent group "$host_gid" | cut -d: -f1)
            if ! id -u builder >/dev/null 2>&1; then
              useradd -m -u "$host_uid" -g "$host_group" builder
            fi
            chown -R "$host_uid:$host_gid" /work/packaging/arch
            runuser -u builder -- makepkg -C --skipinteg --noconfirm
          '
        env:
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            packaging/out/**/*.deb
            packaging/appimage/*.AppImage
            packaging/arch/*.tar.gz
            packaging/arch/*.pkg.*

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -euo pipefail
          echo "Uploading .deb files..."
          for f in packaging/out/**/*.deb; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $name"
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "$UPLOAD_URL?name=$name"
          done
          echo "Uploading AppImage files..."
          for f in packaging/appimage/*.AppImage; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $name"
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "$UPLOAD_URL?name=$name"
          done
          echo "Uploading source tarballs..."
          for f in packaging/arch/*.tar.gz; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $name"
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/gzip" --data-binary @"$f" "$UPLOAD_URL?name=$name"
          done
          echo "Uploading Arch packages..."
          for f in packaging/arch/*.pkg.*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $name"
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "$UPLOAD_URL?name=$name"
          done
