name: deepcool_desktop_app
description: Flutter desktop app for DeepCool Digital CPU/GPU monitor UI
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  deepcool_digital_dart:
    path: ..
  fl_chart: ^1.2.0
  tray_manager: ^0.5.0
  url_launcher: ^6.3.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/support_me_on_kofi_beige.png
